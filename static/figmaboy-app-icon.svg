<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Figmaboy app icon</title>
  <desc id="desc">The ivory Figmaboy modular mark on a rounded charcoal tile.</desc>
  <defs>
    <linearGradient id="tile" x1="120" y1="75" x2="900" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#272c33"/>
      <stop offset="0.5" stop-color="#171a1f"/>
      <stop offset="1" stop-color="#0e1014"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000" flood-opacity=".48"/>
    </filter>
    <filter id="markShadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#000" flood-opacity=".58"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="218" fill="url(#tile)" stroke="#343a43" stroke-width="5" filter="url(#tileShadow)"/>
  <image x="219" y="102" width="586" height="820" preserveAspectRatio="xMidYMid meet"
         href="figmaboy.svg" xlink:href="figmaboy.svg" filter="url(#markShadow)"/>
</svg>
