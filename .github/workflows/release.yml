name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
            executable_suffix: ""
          - name: Windows x86_64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
            executable_suffix: .exe
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            executable_suffix: ""
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            executable_suffix: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    env:
      TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.target }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag and package versions
        run: bun run version:check
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Build application and attach installers
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos-') && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Figmaboy ${{ github.ref_name }}
          releaseBody: |
            Figmaboy is a local-first desktop interface design tool with a native MCP companion for Codex.

            Download the installer for your platform below. This release also includes standalone `figmaboy-mcp` binaries and a `SHA256SUMS` file.

            macOS builds are ad-hoc signed and are not notarized yet, so first launch may require approval in Privacy & Security. Windows builds are not code-signed yet and may show a SmartScreen warning.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: false
          releaseAssetNamePattern: Figmaboy_[version]_[platform]_[arch].[ext]
          args: ${{ matrix.args }}

      - name: Attach standalone MCP executable
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sidecar="src-tauri/binaries/figmaboy-mcp-${TAURI_ENV_TARGET_TRIPLE}${{ matrix.executable_suffix }}"
          test -f "$sidecar"
          gh release upload "$GITHUB_REF_NAME" "$sidecar" --clobber

  publish:
    name: Verify and publish release
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Download assets and create checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset_count="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | length')"
          test "$asset_count" -ge 8
          mkdir release-assets
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --dir release-assets
          cd release-assets
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum | sed 's#  \./#  #' > ../SHA256SUMS
          cd ..
          gh release upload "$GITHUB_REF_NAME" SHA256SUMS --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish verified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
